<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,follow" />
  <title>Không tìm thấy trang - Trường Tiểu học Lê Văn Tám</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #022c22;
      background: #f8fafc;
    }
    main {
      width: min(92vw, 560px);
      padding: 32px;
      border: 1px solid #d1fae5;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 20px 55px rgb(15 23 42 / 0.12);
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 5vw, 44px);
    }
    p {
      margin: 0 0 24px;
      color: #047857;
      line-height: 1.6;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 8px;
      background: #047857;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
  <script>
    (function () {
      var base = "/truongthlevantampongdrang/";
      var path = window.location.pathname.replace(base, "");
      var known = ["gioi-thieu", "tin-tuc", "cong-tra-cuu", "tro-ly-ai"];
      if (known.indexOf(path.replace(/\/$/, "")) !== -1) {
        window.location.replace(base + "?p=" + encodeURIComponent(path));
      }
    })();
  </script>
</head>
<body>
  <main>
    <h1>Không tìm thấy trang</h1>
    <p>Đường dẫn này không tồn tại hoặc đã được thay đổi. Bạn có thể quay về cổng thông tin chính của nhà trường.</p>
    <a href="/truongthlevantampongdrang/">Về trang chủ</a>
  </main>
</body>
</html>
